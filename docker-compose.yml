services:
  postgres:
    image: postgres:16-alpine
    container_name: blps-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: blps
      POSTGRES_USER: blps
      POSTGRES_PASSWORD: blps
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
    driver: local
